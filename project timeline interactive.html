// LANE ASSIGNMENT
// ════════════════════════════════════════════════════════

function assignLanes(tasks) {
  const ends = [];
  tasks.forEach(t => {
    let lane = 0;
    while (ends[lane] !== undefined && ends[lane] >= t.s) lane++;
    ends[lane] = t.e;
    t._lane = lane;
  });
  return ends.length;
}

// Build task map & pre-compute row heights
const TM = {};
PROJECTS.forEach(p => {
  p.rows.forEach(r => {
    r._nl = assignLanes(r.tasks);
    r._h  = Math.max(r._nl * LANE_H + ROW_PAD * 2, 46);
    r.tasks.forEach(t => {
      t._pid = p.id;
      t._rl  = r.lbl;
      TM[t.id] = t;
    });
  });
});

function fps() { return AF === 'all' ? PROJECTS : PROJECTS.filter(p => p.id === AF); }

// ── LEFT PANEL ───────────────────────────────────────────

function buildLeft(projs) {
  const el = document.getElementById('tlLeft');
  el.style.width = LW + 'px';
  let h = '';

  h += `<div class="lp-corner" style="height:${HDR_H}px;">
    <span class="lp-corner-txt">Workstream ↕ &nbsp;·&nbsp; Week →</span>
  </div>`;

  projs.forEach(p => {
    const c = PC[p.id];
    h += `<div class="lp-proj" style="height:${PROJ_H}px;background:${c.hd};color:#fff;font-size:11px;">
      <span style="font-size:15px">${c.ic}</span>&nbsp;${p.nm}
    </div>`;
    p.rows.forEach(r => {
      h += `<div class="lp-row" style="height:${r._h}px;border-left-color:${c.hd};">${r.lbl}</div>`;
    });
    if (p.id === 'astron' && AF === 'all') {
      CONFLICTS.forEach(cf => {
        h += `<div class="lp-cf" style="height:${CF_H}px;">⚠️ ${cf.person}</div>`;
      });
    }
  });

  el.innerHTML = h;
}

// ── RIGHT PANEL ──────────────────────────────────────────

function buildRight(projs) {
  const el = document.getElementById('tlRight');
  const TotalW = WW * TW;
  let h = '';

  // Week Header
  h += `<div class="rp-hdr" style="width:${TotalW}px;min-width:${TotalW}px;">`;
  h += `<div class="rp-phases">`;
  PHASES.forEach(ph => {
    const w = (ph.w2 - ph.w1 + 1) * WW;
    h += `<div class="ph-cell" style="width:${w}px;min-width:${w}px;background:${ph.bg};">${ph.lbl}</div>`;
  });
  h += `</div><div class="rp-weeks">`;
  for (let w = 1; w <= TW; w++) {
    h += `<div class="wk-col${w === CUR_WK ? ' curr' : ''}" style="width:${WW}px;min-width:${WW}px;">
      <span class="wk-n">W${w}</span>
    </div>`;
  }
  h += `</div></div>`;

  // Body
  h += `<div style="width:${TotalW}px;min-width:${TotalW}px;">`;

  projs.forEach(p => {
    const c = PC[p.id];

    // Project header strip
    h += `<div class="rp-proj-strip" style="height:${PROJ_H}px;width:${TotalW}px;background:${c.hd};opacity:0.1;border-bottom:2px solid ${c.hd};"></div>`;

    // Task rows
    p.rows.forEach(r => {
      h += `<div class="rp-row" style="height:${r._h}px;width:${TotalW}px;background:${c.lt};--ww:${WW}px;">`;
      h += `<div class="cw-col" style="left:${(CUR_WK-1)*WW}px;width:${WW}px;"></div>`;

      r.tasks.forEach(t => {
        const x  = (t.s - 1) * WW + 2;
        const bw = (t.e - t.s + 1) * WW - 4;
        const y  = ROW_PAD + t._lane * LANE_H;

        let bg = c.bg, bd = c.bd, tx = c.tx;
        if (t.imp) { bg = '#fee2e2'; bd = '#dc2626'; tx = '#991b1b'; }

        const cls = ['tbar',
          t.gate ? 'is-gate' : '',
          t.ms   ? 'is-ms'   : '',
          t.imp  ? 'is-imp'  : '',
          t.sub  ? 'is-sub'  : '',
        ].filter(Boolean).join(' ');

        h += `<div class="${cls}" data-tid="${t.id}"
          style="left:${x}px;top:${y}px;width:${bw}px;height:${BAR_H}px;
                 background:${bg};border-color:${bd};color:${tx};
                 ${t.imp ? 'font-weight:800;' : ''}">`;

        if (t.gate) h += `<div class="gate-bar" style="${t.imp ? 'background:#dc2626;' : ''}"></div>`;

        if (bw > 22) {
          if (t.gate) h += `<span class="ti">${t.imp ? '🚨' : '🔒'}</span>`;
          else if (t.ms) h += `<span class="ti" style="color:${c.hd}">◆</span>`;

          if (bw > 42) {
            h += `<span class="tl-lbl">${t.lbl.replace(/^🔒+\s*/g,'')}</span>`;
          }
          if (t.cf) h += `<span class="tc">⚠️</span>`;
        }
        h += `</div>`;
      });
      h += `</div>`;
    });

    // Conflict rows (after Astron in all-view)
    if (p.id === 'astron' && AF === 'all') {
      CONFLICTS.forEach(cf => {
        const cfX = (cf.week - 1) * WW;
        h += `<div class="rp-cf" style="height:${CF_H}px;width:${TotalW}px;--ww:${WW}px;">`;
        h += `<div class="cw-col" style="left:${(CUR_WK-1)*WW}px;width:${WW}px;"></div>`;
        h += `<div class="cf-strip" style="left:${cfX}px;width:${WW}px;"></div>`;
        if (cfX + WW + 8 < TotalW) {
          h += `<span class="cf-note" style="left:${cfX + WW + 8}px;">${cf.note}</span>`;
        }
        h += `</div>`;
      });
    }
  });

  h += `</div>`;
  el.innerHTML = h;
  attachEvts();
}

const $tt = document.getElementById('tooltip');

function attachEvts() {
  document.querySelectorAll('.tbar').forEach(el => {
    const t = TM[el.dataset.tid];
    if (!t) return;
    el.addEventListener('mouseenter', e => showTT(e, t));
    el.addEventListener('mousemove',  e => moveTT(e));
    el.addEventListener('mouseleave', hideTT);
    el.addEventListener('click',      () => openModal(t));
  });
}

function showTT(e, t) {
  const wr = t.s === t.e ? `Week ${t.s}` : `Weeks ${t.s}–${t.e}`;
  const dur = t.e - t.s + 1;
  $tt.innerHTML = `
    <div class="tt-h">${t.lbl.replace(/^🔒+\s*/g,'')}</div>
    <div><span class="tt-w">${wr}</span> &nbsp;<span style="font-size:10px;color:#475569">${dur} week${dur>1?'s':''}</span></div>
    ${t.who ? `<div class="tt-m">👤 ${t.who}</div>` : ''}
    ${t.det ? `<div class="tt-d">${t.det.slice(0,145)}${t.det.length>145?'…':''}</div>` : ''}
    ${t.gate ? `<div class="tt-gate">🔒 Gate — blocks downstream work</div>` : ''}
    ${t.cf   ? `<div class="tt-cf">⚠️ Resource conflict flagged</div>` : ''}
  `;
  moveTT(e);
  $tt.classList.add('show');
}

function moveTT(e) {
  const tw = 300, th = $tt.offsetHeight || 100;
  let x = e.clientX + 14, y = e.clientY - 10;
  if (x + tw > window.innerWidth - 8)  x = e.clientX - tw - 14;
  if (y + th > window.innerHeight - 8) y = window.innerHeight - th - 8;
  if (y < 8) y = 8;
  $tt.style.left = x + 'px';
  $tt.style.top  = y + 'px';
}
function hideTT() { $tt.classList.remove('show'); }

  let b = `
    <div class="m-badges">
      <span class="badge b-proj" style="background:${c.hd}">${c.ic} ${p.nm}</span>
      ${t.gate ? '<span class="badge b-gate">🔒 Gate</span>' : ''}
      ${t.ms   ? '<span class="badge b-ms">◆ Milestone</span>' : ''}
      ${t.imp  ? '<span class="badge b-imp">🚨 Critical Decision</span>' : ''}
      ${t.cf   ? '<span class="badge b-cf">⚠️ Resource Conflict</span>' : ''}
    </div>
    <div class="m-meta">
      <span class="wpill">${wr}</span>
      <span style="font-size:11px;color:#94a3b8">·</span>
      <span style="font-size:11px;color:#64748b">${dur} week${dur>1?'s':''}</span>
      <span style="font-size:11px;color:#94a3b8">·</span>
      <span style="font-size:11px;color:#64748b">${t._rl}</span>
    </div>
    ${t.who ? `<div class="m-meta"><span class="apill">👤 ${t.who}</span></div>` : ''}

    <div class="m-desc" style="border-left-color:${t.imp ? '#dc2626' : c.hd}">${t.det || 'No additional details.'}</div>
  `;

  if (t.gate) {
    b += `<div class="m-warn w-gate">
      <span style="font-size:18px;flex-shrink:0">${t.imp ? '🚨' : '🔒'}</span>
      <div><strong>${t.imp ? 'Critical Decision Gate:' : 'Gate:'}</strong> All downstream tasks are blocked until this is resolved. Delays here will cascade through the entire timeline.</div>
    </div>`;
  }
  if (t.cfn) {
    b += `<div class="m-warn w-cf" style="margin-top:8px">
      <span style="font-size:18px;flex-shrink:0">⚠️</span>
      <div><strong>Resource Conflict:</strong> ${t.cfn}</div>
    </div>`;
  }

  document.getElementById('mBody').innerHTML = b;
  document.getElementById('modalBg').classList.add('show');
}

// ── ZOOM ──────────────────────────────────────────────────

function applyZoom() {
  const right = document.getElementById('tlRight');
  const frac  = right.scrollWidth > 0 ? right.scrollLeft / right.scrollWidth : 0;
  WW = WWS[wIdx];
  document.getElementById('zlbl').textContent = Math.round(WW / 110 * 100) + '%';
  document.getElementById('zIn').disabled  = wIdx >= WWS.length - 1;
  document.getElementById('zOut').disabled = wIdx <= 0;
  render();
  requestAnimationFrame(() => { right.scrollLeft = frac * right.scrollWidth; });
}

document.getElementById('zIn').addEventListener('click', () => { if (wIdx < WWS.length-1) { wIdx++; applyZoom(); } });
document.getElementById('zOut').addEventListener('click', () => { if (wIdx > 0) { wIdx--; applyZoom(); } });

});

// ── STATS ─────────────────────────────────────────────────

function buildStats() {
  let tasks=0, gates=0, ms=0, cfs=0;
  PROJECTS.forEach(p => p.rows.forEach(r => r.tasks.forEach(t => {
    tasks++;
    if (t.gate) gates++;
    if (t.ms)   ms++;
    if (t.cf)   cfs++;
  })));

  const fp = fps();
  const fpTasks = fp.reduce((n,p) => n + p.rows.reduce((m,r) => m + r.tasks.length, 0), 0);

  document.getElementById('statsBar').innerHTML = `
    <div class="si"><span class="sv">${fpTasks}</span> tasks shown</div>
    <div class="si"><span class="sv" style="color:#ef4444">${gates}</span> total gates</div>
    <div class="si"><span class="sv" style="color:#f59e0b">${ms}</span> milestones</div>
    <div class="si"><span class="sv" style="color:#f97316">${cfs}</span> resource conflicts</div>
    <div class="si"><span class="sv">4</span> workstreams &nbsp;·&nbsp; <span class="sv">20</span> weeks</div>
    <div class="hint">💡 Click any bar for full details &nbsp;·&nbsp; Scroll right to navigate weeks &nbsp;·&nbsp; Use − / + to zoom &nbsp;·&nbsp; <kbd style="background:#f1f5f9;border:1px solid #e2e8f0;border-radius:3px;padding:1px 5px;font-size:10px;">Esc</kbd> to close modal</div>
  `;
}

// ── INIT ──────────────────────────────────────────────────
render();
</script>
